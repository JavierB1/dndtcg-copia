<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport optimizado para evitar el zoom táctil molesto en celulares -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Deck & Drift TCG</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-principal: #f8fafc;
            --blanco: #ffffff;
            --texto-oscuro: #0f172a;
            --texto-gris: #475569;
            --azul-botones: #2563eb;
            --azul-claro: #eff6ff;
            --verde-ok: #10b981;
            --verde-claro: #ecfdf5;
            --borde: #e2e8f0;
            --gold-glow: rgba(245, 158, 11, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-oscuro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.no-scroll {
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        /* --- CABECERA --- */
        .navbar {
            background-color: var(--blanco);
            padding: 16px;
            border-bottom: 2px solid var(--borde);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--azul-botones);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 350px;
        }

        #searchInput {
            width: 100%;
            background-color: var(--bg-principal);
            border: 2px solid var(--borde);
            border-radius: 12px;
            padding: 10px 16px 10px 40px;
            font-size: 0.85rem;
            color: var(--texto-oscuro);
            outline: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        #searchInput:focus {
            border-color: var(--azul-botones);
            background-color: var(--blanco);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--texto-gris);
        }

        .cart-btn-desktop {
            display: none;
            background-color: var(--azul-claro);
            border: 2px solid rgba(37, 99, 235, 0.2);
            color: var(--azul-botones);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .cart-btn-desktop { display: block; }
        }

        /* --- SECCIÓN PRINCIPAL: CARRUSEL DE JOYAS TCG --- */
        .carousel-section {
            max-width: 1100px;
            width: 100%;
            margin: 20px auto 0;
            padding: 0 16px;
        }

        .carousel-title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .carousel-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--texto-oscuro);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .carousel-title i {
            color: #eab308; /* Icono corona dorada */
        }

        .carousel-controls {
            display: flex;
            gap: 6px;
        }

        .carousel-arrow {
            background-color: var(--blanco);
            border: 2px solid var(--borde);
            color: var(--texto-gris);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .carousel-arrow:hover {
            border-color: var(--azul-botones);
            color: var(--azul-botones);
        }

        .carousel-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 4px 4px 12px;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            cursor: grab;
            user-select: none;
            justify-content: flex-start; /* Se ajustará dinámicamente mediante JS */
        }

        .carousel-container:active {
            cursor: grabbing;
        }

        .carousel-container::-webkit-scrollbar {
            height: 4px;
        }
        .carousel-container::-webkit-scrollbar-thumb {
            background: var(--borde);
            border-radius: 4px;
        }

        /* Tarjeta del Carrusel (Estilo Destacado con Glow) */
        .carousel-card {
            flex: 0 0 160px;
            scroll-snap-align: start;
            background-color: var(--blanco);
            border: 2px solid #fef3c7;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 6px 12px var(--gold-glow);
            transition: transform 0.2s;
        }

        .carousel-card:hover {
            transform: translateY(-2px);
        }

        .carousel-img-box {
            aspect-ratio: 3 / 4;
            background-color: #f8fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .carousel-img-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .carousel-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--texto-oscuro);
            line-height: 1.25;
            margin-bottom: 6px;
            height: 30px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .crown-tag {
            position: absolute;
            top: 6px;
            right: 6px;
            background-color: #fef3c7;
            color: #d97706;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        /* --- FILTROS DE INICIO (BOTONES GIGANTES) --- */
        .filter-section {
            max-width: 1100px;
            width: 100%;
            margin: 20px auto 0;
            padding: 0 16px;
        }

        .type-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .tab-btn {
            background-color: var(--blanco);
            border: 2px solid var(--borde);
            padding: 16px;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--texto-gris);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--azul-botones);
            color: var(--blanco);
            border-color: var(--azul-botones);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
        }

        /* Lista horizontal de franquicias / juegos */
        .categories-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-chip {
            background-color: var(--blanco);
            border: 2px solid var(--borde);
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--texto-gris);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .cat-chip.active {
            background-color: var(--azul-claro);
            color: var(--azul-botones);
            border-color: var(--azul-botones);
        }

        /* --- GRILLA DE PRODUCTOS (2 columnas en celular, 4 en laptop) --- */
        .main-container {
            max-width: 1100px;
            width: 100%;
            margin: 10px auto 100px;
            padding: 0 16px;
            flex: 1;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }

        .product-card {
            background-color: var(--blanco);
            border: 2px solid var(--borde);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-2px);
        }

        .card-image-box {
            aspect-ratio: 3 / 4;
            background-color: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .card-image-box img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .product-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--texto-oscuro);
            line-height: 1.3;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 34px;
        }

        .card-bottom-row {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }

        .price-text {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--verde-ok);
        }

        /* Botón de agregar Gigante */
        .add-btn {
            background-color: var(--verde-ok);
            border: none;
            color: var(--blanco);
            width: 38px;
            height: 38px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        .add-btn:active {
            transform: scale(0.9);
        }

        .add-btn:disabled {
            background-color: var(--borde);
            color: var(--texto-gris);
            cursor: not-allowed;
        }

        .out-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #fee2e2;
            color: #ef4444;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            text-transform: uppercase;
            z-index: 5;
        }

        /* --- BARRA FLOTANTE MÓVIL (CARRITO) --- */
        .mobile-cart-bar {
            position: fixed;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background-color: var(--azul-botones);
            color: var(--blanco);
            padding: 16px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px -3px rgba(37, 99, 235, 0.4);
            transform: translateY(150%);
            transition: transform 0.3s ease;
            z-index: 90;
        }

        .mobile-cart-bar.show {
            transform: translateY(0);
        }

        .badge-count {
            background-color: var(--blanco);
            color: var(--azul-botones);
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-left: 6px;
        }

        /* --- PANELES DEL CARRITO (DRAWER) --- */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            visibility: hidden;
        }

        .cart-drawer.open {
            visibility: visible;
        }

        .cart-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 21, 32, 0.4);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .cart-drawer.open .cart-overlay {
            opacity: 1;
        }

        .cart-content {
            position: absolute;
            right: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: var(--blanco);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.25s ease;
        }

        @media (min-width: 768px) {
            .cart-content { max-width: 420px; border-left: 2px solid var(--borde); }
        }

        .cart-drawer.open .cart-content {
            transform: translateX(0);
        }

        .cart-header {
            padding: 16px;
            border-bottom: 2px solid var(--borde);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: var(--texto-gris);
            cursor: pointer;
        }

        .cart-items-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-principal);
            padding: 10px;
            border-radius: 14px;
            border: 1px solid var(--borde);
        }

        .cart-row-name {
            font-size: 0.8rem;
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-qty-controls {
            display: flex;
            align-items: center;
            background-color: var(--blanco);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 2px;
            gap: 6px;
        }

        .cart-qty-btn {
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- SECCIÓN DE ENTREGA --- */
        .cart-footer {
            padding: 16px;
            border-top: 2px solid var(--borde);
            background-color: var(--bg-principal);
        }

        .total-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .total-price { color: var(--verde-ok); font-size: 1.3rem; font-weight: 800; }

        .delivery-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .delivery-option {
            background-color: var(--blanco);
            border: 2px solid var(--borde);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* Destacado en Verde */
        .delivery-option.preferred {
            border-color: var(--verde-ok);
            background-color: var(--verde-claro);
            color: var(--verde-ok);
        }

        .delivery-option input {
            accent-color: var(--verde-ok);
        }

        .input-name {
            width: 100%;
            border: 2px solid var(--borde);
            border-radius: 10px;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            outline: none;
            margin-bottom: 10px;
        }

        .input-name:focus { border-color: var(--azul-botones); }

        .btn-send-whatsapp {
            width: 100%;
            background-color: var(--verde-ok);
            color: var(--blanco);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            transition: background-color 0.2s;
        }

        .btn-send-whatsapp:hover {
            background-color: #059669;
        }

        .spinner-container {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--texto-gris);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .database-empty-box {
            grid-column: 1 / -1;
            background-color: #f0fdf4;
            border: 2px dashed var(--verde-ok);
            color: var(--texto-oscuro);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin: 16px auto;
            max-width: 600px;
            font-size: 0.9rem;
        }

        .database-empty-box h3 {
            font-weight: 800;
            color: var(--verde-ok);
            margin-bottom: 8px;
        }

        .error-container {
            grid-column: 1 / -1;
            background-color: #fef2f2;
            border: 2px dashed #ef4444;
            color: #b91c1c;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin: 16px auto;
            max-width: 600px;
            font-size: 0.9rem;
        }

        .error-container h3 {
            font-weight: 800;
            margin-bottom: 8px;
        }

        .error-container code {
            display: block;
            background-color: #fee2e2;
            padding: 8px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: left;
            overflow-x: auto;
        }

        .toast-box {
            position: fixed;
            bottom: 85px;
            left: 16px;
            right: 16px;
            background-color: var(--texto-oscuro);
            color: var(--blanco);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
            z-index: 10000;
            display: none;
        }
    </style>
</head>
<body>

    <!-- NAVBAR MÓVIL Y DESKTOP -->
    <nav class="navbar">
        <div class="nav-container">
            <span class="logo-text">DECK & DRIFT</span>
            
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="¿Qué carta buscas hoy?">
            </div>

            <button id="cartDesktopBtn" class="cart-btn-desktop">
                <i class="fas fa-shopping-cart"></i> Carrito (<span class="cart-num">0</span>)
            </button>
        </div>
    </nav>

    <!-- CARRUSEL DE CARTAS MÁS CARAS (Joyas del Mazo) -->
    <section class="carousel-section" id="carouselSection" style="display: none;">
        <div class="carousel-title-container">
            <span class="carousel-title">
                <i class="fas fa-crown"></i> Joyas del Inventario
            </span>
            <div class="carousel-controls" id="carouselControls" style="display: none;">
                <button class="carousel-arrow" id="btnPrevCarousel" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
                <button class="carousel-arrow" id="btnNextCarousel" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="carousel-container" id="carouselContainer">
            <div class="spinner-container">Conectando base de datos en tiempo real...</div>
        </div>
    </section>

    <!-- BOTONES PRINCIPALES DE ENTRADA -->
    <div class="filter-section">
        <div class="type-tabs">
            <button id="tabSingles" class="tab-btn active">
                <span>🃏 Cartas</span>
            </button>
            <button id="tabSealed" class="tab-btn">
                <span>📦 Producto Suelto</span>
            </button>
        </div>

        <!-- Chips de selección rápida -->
        <div class="categories-scroll" id="categoriesContainer">
            <!-- Pokémon, Yu-Gi-Oh, etc. -->
        </div>
    </div>

    <!-- GRILLA PRINCIPAL DE ARTÍCULOS -->
    <main class="main-container">
        <div class="products-grid" id="productsGrid">
            <div class="spinner-container">Uniendo base de datos en tiempo real...</div>
        </div>
    </main>

    <!-- BARRA FLOTANTE MÓVIL (CARRITO) -->
    <div id="mobileCartBar" class="mobile-cart-bar">
        <span>🛒 Ver mi pedido</span>
        <span class="badge-count cart-num">0</span>
    </div>

    <!-- MENÚ DEL CARRITO (DRAWER) -->
    <div id="cartDrawer" class="cart-drawer">
        <div id="cartOverlay" class="cart-overlay"></div>
        <div class="cart-content">
            <div class="cart-header">
                <h3>📝 Tu Pedido</h3>
                <button id="closeCartBtn" class="close-btn"><i class="fas fa-times"></i></button>
            </div>

            <div class="cart-items-list" id="cartItemsContainer"></div>

            <div class="cart-footer">
                <div class="total-box">
                    <span>Total:</span>
                    <span id="cartTotalValue" class="total-price">$0.00</span>
                </div>

                <!-- Método de entrega priorizando punto de retiro -->
                <div class="delivery-selector">
                    <label class="delivery-option preferred" id="optPickup">
                        <input type="radio" name="delivType" value="pickup" checked>
                        <div>
                            <span style="display:block;">📍 Punto de Entrega (Tienda)</span>
                            <span style="font-size:0.65rem; color:#059669; display:block;">¡Gratis! Retira en nuestro punto de encuentro</span>
                        </div>
                    </label>

                    <label class="delivery-option" id="optShipping" style="opacity: 0.65;">
                        <input type="radio" name="delivType" value="shipping">
                        <div>
                            <span style="display:block;">🛵 Envío a Domicilio</span>
                            <span style="font-size:0.65rem; color:var(--texto-gris); display:block;">Costo de envío extra a coordinar</span>
                        </div>
                    </label>
                </div>

                <!-- Formularios simples -->
                <input type="text" id="customerName" class="input-name" placeholder="Escribe tu Nombre aquí *" required>
                <input type="text" id="customerAddress" class="input-name" placeholder="Escribe tu dirección de envío *" style="display: none;">

                <button id="btnSubmitOrder" class="btn-send-whatsapp">
                    <i class="fab fa-whatsapp"></i> ¡Pedir por WhatsApp!
                </button>
            </div>
        </div>
    </div>

    <!-- Toast aviso rápido -->
    <div id="toastBox" class="toast-box"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, onSnapshot, runTransaction, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDjRTOnQ4d9-4l_W-EwRbYNQ8xkTLKbwsM",
            authDomain: "dndtcgadmin.firebaseapp.com",
            projectId: "dndtcgadmin",
            storageBucket: "dndtcgadmin.firebasestorage.app",
            messagingSenderId: "754642671504",
            appId: "1:754642671504:web:c087cc703862cf8c228515"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ID del Proyecto de Firebase como appId para las rutas anidadas
        const appId = firebaseConfig.projectId; // dndtcgadmin

        // Variables de Memoria de la Aplicación
        let products = [];
        let cardsList = [];
        let sealedList = [];
        let categories = [];
        let cart = [];

        let activeType = 'single'; // 'single' = Cartas, 'sealed' = Producto Suelto
        let activeCategory = '';

        // DOM Referencias
        const productsGrid = document.getElementById('productsGrid');
        const carouselContainer = document.getElementById('carouselContainer');
        const carouselSection = document.getElementById('carouselSection');
        const carouselControls = document.getElementById('carouselControls');
        const categoriesContainer = document.getElementById('categoriesContainer');
        const searchInput = document.getElementById('searchInput');
        const cartTotalValue = document.getElementById('cartTotalValue');
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const customerName = document.getElementById('customerName');
        const customerAddress = document.getElementById('customerAddress');
        const optPickup = document.getElementById('optPickup');
        const optShipping = document.getElementById('optShipping');

        function getProductProps(p) {
            return {
                id: p.id,
                name: p.nombre || p.name || "Sin Nombre",
                price: parseFloat(p.precio !== undefined ? p.precio : (p.price !== undefined ? p.price : 0)),
                img: p.imagenUrl || p.imagen || p.imageUrl || p.image || 'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=200',
                stock: parseInt(p.stock !== undefined ? p.stock : 0),
                category: p.categoria || p.category || "General",
                type: p.type || "single",
                expansion: p.expansion || p.expansión || "",
                code: p.codigo || p.code || ""
            };
        }

        // Función para renderizar el error de permisos en pantalla en vez de dejar "Cargando..."
        function handleFirebaseError(error, context) {
            console.error(`Error en ${context}:`, error);
            if (error.code === 'permission-denied' || error.message.includes('permission-denied')) {
                productsGrid.innerHTML = `
                    <div class="error-container">
                        <h3>🔒 Error de Permisos en Firebase</h3>
                        <p>Tu base de datos Firestore está rechazando las lecturas públicas. Por favor ingresa a las <strong>Reglas (Rules)</strong> de Firestore en tu Firebase Console y configúralas para permitir lecturas públicas.</p>
                        <code>// Copia esto en tus reglas de Firestore:\nmatch /artifacts/{appId}/public/data/cards/{doc} { allow read: if true; }\nmatch /artifacts/{appId}/public/data/sealedProducts/{doc} { allow read: if true; }\nmatch /artifacts/{appId}/public/data/categories/{doc} { allow read: if true; }</code>
                    </div>
                `;
                carouselContainer.innerHTML = `<div style="text-align:center; padding:10px; color:#b91c1c; font-size:0.8rem; font-weight:700;">No se pudieron cargar las Joyas debido a reglas de Firebase.</div>`;
            } else {
                triggerToast(`Error de conexión con Firebase (${context})`);
            }
        }

        // ==========================================
        // 1. INICIALIZACIÓN Y CONSULTAS INDEPENDIENTES
        // ==========================================
        async function init() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Error al autenticar de forma anónima:", err);
            }
            
            // Suscripción independiente a Categorías (Corregida con la ruta dividida exacta del Admin)
            onSnapshot(collection(db, "artifacts", appId, "public", "data", "categories"), (snap) => {
                categories = [];
                console.log(`[Firebase Diagnostics] categories: Recibidos ${snap.size} documentos`);
                snap.forEach(d => categories.push(d.data()));
                renderCategoriesUI();
            }, (error) => {
                handleFirebaseError(error, "categories");
            });

            // Suscripción independiente a Cartas (Corregida con la ruta dividida exacta del Admin)
            onSnapshot(collection(db, "artifacts", appId, "public", "data", "cards"), (snap1) => {
                cardsList = [];
                console.log(`[Firebase Diagnostics] cards: Recibidos ${snap1.size} documentos`);
                snap1.forEach(d => cardsList.push({ id: d.id, type: 'single', ...d.data() }));
                
                mergeAndRender();
            }, (error) => {
                handleFirebaseError(error, "cards");
            });

            // Suscripción independiente a Producto Sellado (Corregida con la ruta dividida exacta del Admin)
            onSnapshot(collection(db, "artifacts", appId, "public", "data", "sealedProducts"), (snap2) => {
                sealedList = [];
                console.log(`[Firebase Diagnostics] sealedProducts: Recibidos ${snap2.size} documentos`);
                snap2.forEach(d => sealedList.push({ id: d.id, type: 'sealed', ...d.data() }));
                
                mergeAndRender();
            }, (error) => {
                handleFirebaseError(error, "sealedProducts");
            });
        }

        // Unificar los datos de manera limpia para evitar bloqueos por colecciones vacías
        function mergeAndRender() {
            products = [...cardsList, ...sealedList];
            
            renderCarouselUI(); 
            renderProductsUI(); 
        }

        // ==========================================
        // 2. CARGA Y GESTIÓN DEL CARRUSEL DE JOYAS
        // ==========================================
        function renderCarouselUI() {
            carouselContainer.innerHTML = '';
            
            // Filtrar solo Cartas ('single') con precio mayor a 0, ordenar por precio de mayor a menor y tomar las 8 principales
            const expensiveCards = products
                .filter(p => p.type === 'single')
                .sort((a, b) => {
                    const priceA = getProductProps(a).price;
                    const priceB = getProductProps(b).price;
                    return priceB - priceA;
                })
                .slice(0, 8);

            if (expensiveCards.length === 0) {
                carouselSection.style.display = 'none';
                return;
            }

            carouselSection.style.display = 'block';

            expensiveCards.forEach(p => {
                const props = getProductProps(p);
                const card = document.createElement('div');
                card.className = 'carousel-card';
                card.innerHTML = `
                    <span class="crown-tag"><i class="fas fa-crown"></i> Top</span>
                    <div class="carousel-img-box">
                        <img src="${props.img}" onerror="this.src='https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=200'">
                    </div>
                    <h4 class="carousel-name">${props.name}</h4>
                    <div class="card-bottom-row">
                        <span class="price-text">$${props.price.toFixed(2)}</span>
                        <button class="add-btn" onclick="window.addItem('${props.id}')">+</button>
                    </div>
                `;
                carouselContainer.appendChild(card);
            });

            // Ajustar visualización del carrusel según la cantidad de items
            setTimeout(() => {
                const maxScrollLeft = carouselContainer.scrollWidth - carouselContainer.clientWidth;
                if (maxScrollLeft <= 0) {
                    // Si todo cabe, ocultamos flechas y centramos elementos
                    carouselControls.style.display = 'none';
                    carouselContainer.style.justifyContent = 'center';
                } else {
                    // Si hay scroll, mostramos flechas y alineamos a la izquierda para el carrusel
                    carouselControls.style.display = 'flex';
                    carouselContainer.style.justifyContent = 'flex-start';
                }
            }, 100);

            // Inicializar autoplay y arrastre del carrusel
            initCarouselDragAndAutoplay();
        }

        // ==========================================
        // 2.1 LÓGICA DE DRAG & AUTOPLAY INFINITO ADAPTATIVO
        // ==========================================
        let autoplayTimer;
        
        function initCarouselDragAndAutoplay() {
            const carousel = document.getElementById('carouselContainer');
            if (!carousel) return;

            let isDragging = false;
            let startX;
            let scrollLeft;

            // Manejo de drag con el mouse en laptops
            carousel.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.pageX - carousel.offsetLeft;
                scrollLeft = carousel.scrollLeft;
                stopAutoplay();
            });

            carousel.addEventListener('mouseleave', () => {
                if (isDragging) {
                    isDragging = false;
                    startAutoplay();
                }
            });

            carousel.addEventListener('mouseup', () => {
                isDragging = false;
                startAutoplay();
            });

            carousel.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const x = e.pageX - carousel.offsetLeft;
                const walk = (x - startX) * 2.5; 
                carousel.scrollLeft = scrollLeft - walk;
            });

            // Detener autoplay al tocar en celulares
            carousel.addEventListener('touchstart', () => {
                stopAutoplay();
            });

            carousel.addEventListener('touchend', () => {
                startAutoplay();
            });

            // Iniciar ciclo automático
            startAutoplay();
        }

        function startAutoplay() {
            stopAutoplay();
            const carousel = document.getElementById('carouselContainer');
            if (!carousel) return;

            autoplayTimer = setInterval(() => {
                const maxScrollLeft = carousel.scrollWidth - carousel.clientWidth;
                
                // Si no hay desbordamiento (cabe todo), no hacemos scroll automático
                if (maxScrollLeft <= 0) return;
                
                // Si ya llegó al final de la lista, regresa suavemente al inicio
                if (carousel.scrollLeft >= maxScrollLeft - 15) {
                    carousel.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    const card = carousel.querySelector('.carousel-card');
                    if (card) {
                        const cardWidth = card.offsetWidth + 12; 
                        carousel.scrollBy({ left: cardWidth, behavior: 'smooth' });
                    }
                }
            }, 3000); // Avanzar cada 3 segundos
        }

        function stopAutoplay() {
            if (autoplayTimer) {
                clearInterval(autoplayTimer);
            }
        }

        // ==========================================
        // 3. FILTRADO Y RENDERIZADO DE LA TIENDA
        // ==========================================
        function renderCategoriesUI() {
            categoriesContainer.innerHTML = '';
            
            const allBtn = document.createElement('button');
            allBtn.className = `cat-chip ${!activeCategory ? 'active' : ''}`;
            allBtn.textContent = 'Todo';
            allBtn.onclick = () => { activeCategory = ''; toggleChips(allBtn); renderProductsUI(); };
            categoriesContainer.appendChild(allBtn);

            categories.forEach(cat => {
                const catName = cat.nombre || cat.name;
                if (!catName) return;
                const btn = document.createElement('button');
                btn.className = `cat-chip ${activeCategory === catName ? 'active' : ''}`;
                btn.textContent = catName;
                btn.onclick = () => { activeCategory = catName; toggleChips(btn); renderProductsUI(); };
                categoriesContainer.appendChild(btn);
            });
        }

        function toggleChips(selected) {
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            selected.classList.add('active');
        }

        function renderProductsUI() {
            productsGrid.innerHTML = '';
            
            let list = products.filter(p => p.type === activeType);
            if (activeCategory) {
                list = list.filter(p => getProductProps(p).category === activeCategory);
            }

            const sVal = searchInput.value.toLowerCase().trim();
            if (sVal) {
                list = list.filter(p => getProductProps(p).name.toLowerCase().includes(sVal));
            }

            // Si no hay productos porque la base de datos está vacía, mostramos una guía amigable
            if (products.length === 0) {
                productsGrid.innerHTML = `
                    <div class="database-empty-box">
                        <h3>🔌 Conexión Establecida</h3>
                        <p>Tu base de datos Firebase está conectada correctamente, pero tus colecciones de Firestore están vacías de momento.</p>
                        <p style="font-size:0.8rem; color:var(--texto-gris); margin-top:8px;">Abre tu panel de control (<code>admin.html</code>) o tu Firebase Console y añade algunos documentos a tus colecciones de <strong>cards</strong> o <strong>sealedProducts</strong> para verlos aquí.</p>
                    </div>
                `;
                return;
            }

            if(list.length === 0) {
                productsGrid.innerHTML = `<div class="spinner-container">No hay cartas ni productos de este tipo listos de momento.</div>`;
                return;
            }

            list.forEach(p => {
                const props = getProductProps(p);
                const card = document.createElement('div');
                card.className = 'product-card';

                let badge = props.stock <= 0 ? `<span class="out-badge">Agotado</span>` : '';

                card.innerHTML = `
                    ${badge}
                    <div class="card-image-box">
                        <img src="${props.img}" onerror="this.src='https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=200'">
                    </div>
                    <h3 class="product-name">${props.name}</h3>
                    <div class="card-bottom-row">
                        <span class="price-text">$${props.price.toFixed(2)}</span>
                        ${props.stock <= 0 ? 
                            `<button class="add-btn" disabled><i class="fas fa-ban"></i></button>` : 
                            `<button class="add-btn" onclick="window.addItem('${props.id}')">+</button>`
                        }
                    </div>
                `;
                productsGrid.appendChild(card);
            });
        }

        // ==========================================
        // 4. LÓGICA OPERATIVA DEL CARRITO
        // ==========================================
        window.addItem = function(id) {
            const prod = products.find(p => p.id === id);
            if (!prod) return;

            const props = getProductProps(prod);
            const exist = cart.find(c => c.id === id);

            if (exist) {
                if (exist.quantity < props.stock) {
                    exist.quantity++;
                    triggerToast("¡Añadida otra copia al carrito!");
                } else {
                    triggerToast("No quedan más unidades en stock.");
                }
            } else {
                cart.push({ id: props.id, name: props.name, price: props.price, type: props.type, category: props.category, quantity: 1 });
                triggerToast("¡Añadido al carrito!");
            }
            updateCartUI();
        };

        window.changeQty = function(id, val) {
            const item = cart.find(c => c.id === id);
            if (!item) return;
            const original = products.find(p => p.id === id);
            const props = original ? getProductProps(original) : null;
            const stock = props ? props.stock : 1;

            item.quantity += val;
            if (item.quantity <= 0) cart = cart.filter(c => c.id !== id);
            if (item.quantity > stock) item.quantity = stock;
            
            updateCartUI();
        };

        function updateCartUI() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            let count = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<div style="text-align:center; padding:40px; color:var(--texto-gris); font-size:0.85rem;">Tu carrito está limpio por el momento.</div>`;
                document.getElementById('mobileCartBar').classList.remove('show');
                document.querySelectorAll('.cart-num').forEach(n => n.textContent = '0');
                cartTotalValue.textContent = '$0.00';
                return;
            }

            cart.forEach(item => {
                total += item.price * item.quantity;
                count += item.quantity;

                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <span class="cart-row-name">${item.name}</span>
                    <div class="cart-qty-controls">
                        <button class="cart-qty-btn" onclick="window.changeQty('${item.id}', -1)">-</button>
                        <span style="font-size:0.75rem; font-weight:700;">${item.quantity}</span>
                        <button class="cart-qty-btn" onclick="window.changeQty('${item.id}', 1)">+</button>
                    </div>
                    <span style="font-size:0.8rem; font-weight:700; color:var(--verde-ok); min-width:45px; text-align:right;">$${(item.price * item.quantity).toFixed(2)}</span>
                `;
                cartItemsContainer.appendChild(row);
            });

            cartTotalValue.textContent = `$${total.toFixed(2)}`;
            document.querySelectorAll('.cart-num').forEach(n => n.textContent = count);
            document.getElementById('mobileCartBar').classList.add('show');
        }

        // Selección de entrega
        document.getElementsByName('delivType').forEach(r => {
            r.addEventListener('change', () => {
                if (r.value === 'shipping') {
                    optShipping.classList.add('preferred');
                    optPickup.classList.remove('preferred');
                    optShipping.style.opacity = "1";
                    optPickup.style.opacity = "0.65";
                    customerAddress.style.display = 'block';
                    customerAddress.required = true;
                } else {
                    optPickup.classList.add('preferred');
                    optShipping.classList.remove('preferred');
                    optPickup.style.opacity = "1";
                    optShipping.style.opacity = "0.65";
                    customerAddress.style.display = 'none';
                    customerAddress.required = false;
                    customerAddress.value = '';
                }
            });
        });

        // Enviar pedido mediante WhatsApp
        document.getElementById('btnSubmitOrder').onclick = async () => {
            const name = customerName.value.trim();
            const address = customerAddress.value.trim();
            const deliv = document.querySelector('input[name="delivType"]:checked').value;

            if (!name) return alert("Por favor escribe tu nombre");
            if (deliv === 'shipping' && !address) return alert("Escribe tu dirección de envío");

            const btn = document.getElementById('btnSubmitOrder');
            btn.disabled = true;
            btn.textContent = "Procesando pedido...";

            try {
                let finalTotal = 0;
                let finalItems = [];

                await runTransaction(db, async (transaction) => {
                    for (const item of cart) {
                        const coll = item.type === 'single' ? 'cards' : 'sealedProducts';
                        // Referencia corregida para la transacción con ruta separada exacta
                        const ref = doc(db, "artifacts", appId, "public", "data", coll, item.id);
                        const snap = await transaction.get(ref);
                        const dbData = snap.data();

                        const currentStock = parseInt(dbData.stock !== undefined ? dbData.stock : 0);
                        if (currentStock < item.quantity) throw `Stock agotado para: ${item.name}`;

                        transaction.update(ref, { stock: currentStock - item.quantity });
                        finalItems.push({ name: item.name, quantity: item.quantity, price: item.price });
                        finalTotal += item.price * item.quantity;
                    }

                    // Registrar en la colección de órdenes correcta: artifacts/{appId}/public/data/orders
                    await addDoc(collection(db, "artifacts", appId, "public/data", "orders"), {
                        cliente: name,
                        metodoEntrega: deliv === 'shipping' ? 'Envío' : 'Punto de Entrega',
                        direccion: address,
                        items: finalItems,
                        total: finalTotal,
                        fecha: new Date(),
                        estado: "Pendiente"
                    });
                });

                let msg = `*¡HOLA! VENGO DE LA WEB Y QUIERO MI PEDIDO*\n\n`;
                msg += `👤 *Nombre:* ${name}\n`;
                msg += `📍 *Retiro:* ${deliv === 'shipping' ? '🛵 Envío a Domicilio' : '🏪 Punto de Entrega (Tienda)'}\n`;
                if(deliv === 'shipping') msg += `🏠 *Dirección:* ${address}\n`;
                msg += `\n📋 *MIS PRODUCTOS:*\n`;
                cart.forEach(i => msg += `- ${i.name} (x${i.quantity})\n`);
                msg += `\n💰 *Total:* $${finalTotal.toFixed(2)}`;

                const numTienda = "50375464267";
                window.open(`https://api.whatsapp.com/send?phone=${numTienda}&text=${encodeURIComponent(msg)}`, '_blank');
                
                cart = [];
                customerName.value = '';
                customerAddress.value = '';
                updateCartUI();
                document.getElementById('cartDrawer').classList.remove('open');
                document.body.classList.remove('no-scroll');

            } catch(e) {
                alert(e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fab fa-whatsapp"></i> ¡Pedir por WhatsApp!`;
            }
        };

        // Eventos del Carrusel manual
        const carousel = document.getElementById('carouselContainer');
        document.getElementById('btnPrevCarousel').onclick = () => {
            stopAutoplay();
            const card = carousel.querySelector('.carousel-card');
            if (card) {
                const cardWidth = card.offsetWidth + 12;
                carousel.scrollBy({ left: -cardWidth, behavior: 'smooth' });
            }
            startAutoplay();
        };
        document.getElementById('btnNextCarousel').onclick = () => {
            stopAutoplay();
            const card = carousel.querySelector('.carousel-card');
            if (card) {
                const cardWidth = card.offsetWidth + 12;
                carousel.scrollBy({ left: cardWidth, behavior: 'smooth' });
            }
            startAutoplay();
        };

        // Eventos de selección de Pestañas
        document.getElementById('tabSingles').onclick = () => { 
            activeType = 'single'; 
            document.getElementById('tabSingles').classList.add('active'); 
            document.getElementById('tabSealed').classList.remove('active'); 
            renderProductsUI(); 
        };
        document.getElementById('tabSealed').onclick = () => { 
            activeType = 'sealed'; 
            document.getElementById('tabSealed').classList.add('active'); 
            document.getElementById('tabSingles').classList.remove('active'); 
            renderProductsUI(); 
        };
        
        function openCart() { document.getElementById('cartDrawer').classList.add('open'); document.body.classList.add('no-scroll'); }
        function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.body.classList.remove('no-scroll'); }
        
        document.getElementById('mobileCartBar').onclick = openCart;
        document.getElementById('cartDesktopBtn').onclick = openCart;
        document.getElementById('closeCartBtn').onclick = closeCart;
        document.getElementById('cartOverlay').onclick = closeCart;
        searchInput.oninput = renderProductsUI;

        function triggerToast(m) {
            const t = document.getElementById('toastBox');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        init();
    </script>
</body>
</html>
