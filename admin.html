<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D TCG - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- MODAL DE LOGIN (Fuera del contenedor principal para evitar conflictos de flex) -->
    <div id="loginModal" class="admin-modal-overlay">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Acceso Administrativo</h2>
                <p>Ingrese sus credenciales para continuar</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="username" placeholder="admin@dndtcg.com" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Entrar al Panel</button>
                <p id="loginMessage" class="error-msg"></p>
            </form>
        </div>
    </div>

    <div class="admin-container">
        <!-- BARRA LATERAL -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="img/logo.png" alt="Logo" class="admin-logo" onerror="this.src='https://via.placeholder.com/50'">
                <span>D&D TCG</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard-section" class="nav-link active"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
                <a href="#cards-section" class="nav-link"><i class="fas fa-clone"></i> <span>Cartas</span></a>
                <a href="#sealed-products-section" class="nav-link"><i class="fas fa-box-open"></i> <span>Productos</span></a>
                <a href="#categories-section" class="nav-link"><i class="fas fa-tags"></i> <span>Categorías</span></a>
                <a href="#orders-section" class="nav-link"><i class="fas fa-shopping-cart"></i> <span>Pedidos</span></a>
                <a href="#" id="btnLogout" class="nav-link logout"><i class="fas fa-sign-out-alt"></i> <span>Salir</span></a>
            </nav>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content" id="mainContent">
            <!-- DASHBOARD -->
            <section id="dashboard-section" class="admin-section active">
                <h1>Resumen de Tienda</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-clone"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-total-cards">0</span>
                            <span class="stat-label">Cartas Totales</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-cubes"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-total-stock">0</span>
                            <span class="stat-label">Stock Total</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-receipt"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="stat-total-orders">0</span>
                            <span class="stat-label">Pedidos Hoy</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN CARTAS (Resto de secciones se mantienen igual estructuralmente) -->
            <section id="cards-section" class="admin-section">
                <div class="section-header">
                    <h2>Gestión de Cartas</h2>
                    <button class="btn-add">Nueva Carta</button>
                </div>
                <div class="table-container">
                    <table id="cardsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
