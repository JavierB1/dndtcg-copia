<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - DND TCG</title>
    <!-- Fuentes y Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Overlay para móvil -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <aside id="sidebar-menu" class="sidebar">
            <div class="sidebar-header">
                <img src="https://placehold.co/40x40/6366f1/ffffff?text=DND" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">DND TCG Admin</span>
                <button id="closeSidebarBtn" class="close-sidebar-btn"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" id="nav-dashboard" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="#" id="nav-cards"><i class="fas fa-id-card"></i> Cartas</a></li>
                    <li><a href="#" id="nav-sealed-products"><i class="fas fa-box-open"></i> Productos Sellados</a></li>
                    <li><a href="#" id="nav-categories"><i class="fas fa-tags"></i> Categorías</a></li>
                    <li><a href="#" id="nav-orders"><i class="fas fa-shopping-cart"></i> Pedidos</a></li>
                    <li class="nav-divider"></li>
                    <li><a href="#" id="nav-logout" class="nav-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="main-header">
                <button id="sidebarToggleBtn" class="menu-toggle"><i class="fas fa-bars"></i></button>
                <div class="header-info">
                    <h1 id="section-title">Dashboard</h1>
                    <button id="refreshAdminPageBtn" class="btn-refresh"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>

            <div class="content-body">
                <!-- Dashboard Section -->
                <section id="dashboard-section" class="admin-section active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-id-card"></i></div>
                            <div class="stat-details">
                                <h3 id="totalCardsCount">0</h3>
                                <p>Total de Cartas</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-box"></i></div>
                            <div class="stat-details">
                                <h3 id="totalSealedProductsCount">0</h3>
                                <p>Productos Sellados</p>
                            </div>
                        </div>
                        <div class="stat-card warning">
                            <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                            <div class="stat-details">
                                <h3 id="outOfStockCount">0</h3>
                                <p>Sin Stock</p>
                            </div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-icon"><i class="fas fa-tags"></i></div>
                            <div class="stat-details">
                                <h3 id="uniqueCategoriesCount">0</h3>
                                <p>Categorías</p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Cards Management Section -->
                <section id="cards-section" class="admin-section">
                    <div class="section-header-actions">
                        <h2>Gestión de Cartas</h2>
                        <!-- Definición: Botón de añadir cambiado por un icono "+" -->
                        <button id="addCardBtn" class="add-button"><i class="fas fa-plus"></i></button>
                    </div>

                    <div class="filter-bar">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="adminSearchInput" placeholder="Buscar por nombre o ID...">
                        </div>
                        <select id="adminCategoryFilter">
                            <option value="">Todas las categorías</option>
                        </select>
                    </div>

                    <div class="table-container">
                        <table id="cardsTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Imagen</th>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Categoría</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="cardsTableBody">
                                <!-- Datos cargados por JS -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="pagination">
                        <button id="adminPrevPageBtn" disabled><i class="fas fa-chevron-left"></i></button>
                        <span id="adminPageInfo">Página 1 de 1</span>
                        <button id="adminNextPageBtn" disabled><i class="fas fa-chevron-right"></i></button>
                    </div>
                </section>

                <!-- Otras secciones (Sealed Products, Categories, Orders) se mantienen igual internamente -->
                <!-- ... -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Card Modal -->
    <div id="cardModal" class="admin-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="cardModalTitle">Añadir Nueva Carta</h3>
                <span class="close-button">&times;</span>
            </div>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                <div class="form-group">
                    <label for="cardName">Nombre de la Carta</label>
                    <input type="text" id="cardName" required>
                </div>
                <div class="form-group">
                    <label for="cardImage">URL de la Imagen</label>
                    <input type="url" id="cardImage">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cardPrice">Precio ($)</label>
                        <input type="number" id="cardPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="cardStock">Stock</label>
                        <input type="number" id="cardStock" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="cardCategory">Categoría</label>
                    <select id="cardCategory" required></select>
                </div>
                <div class="modal-footer">
                    <button type="submit" id="saveCardBtn" class="btn-save">Guardar Carta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
