<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - DND TCG</title>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Barra lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>DND TCG Admin</h3>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" class="nav-link active" data-section="dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="#" class="nav-link" data-section="cards-section" id="nav-cards"><i class="fas fa-id-card"></i> Gestión de Cartas</a></li>
                    <li><a href="#" class="nav-link" data-section="products-section"><i class="fas fa-box-open"></i> Productos Sellados</a></li>
                    <li><a href="#" class="nav-link" data-section="categories-section"><i class="fas fa-tags"></i> Categorías</a></li>
                    <li><a href="#" class="nav-link" data-section="orders-section"><i class="fas fa-shopping-cart"></i> Pedidos</a></li>
                    <li><a href="#" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Contenido principal -->
        <main class="main-content">
            <!-- Sección Dashboard (Se mantiene igual) -->
            <section id="dashboard" class="admin-section">
                <h1>Panel de Control</h1>
                <div class="stats-grid">
                    <!-- Tus stats actuales -->
                </div>
            </section>

            <!-- SECCIÓN GESTIÓN DE CARTAS (ACTUALIZADA) -->
            <section id="cards-section" class="admin-section" style="display: none;">
                <div class="section-header">
                    <h2>Gestión de Inventario de Cartas</h2>
                    <!-- Aquí están los nuevos botones que pediste -->
                    <div class="action-buttons-container" style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button id="addCardBtn" class="btn-square btn-green" title="Añadir Carta">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button id="scanCardBtn" class="btn-square btn-blue" title="Escanear Carta">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div class="search-bar">
                    <input type="text" id="adminSearchInput" placeholder="Buscar carta por nombre o set...">
                </div>

                <div class="table-container">
                    <table id="cardsTable">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Código Set</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cardsTableBody">
                            <!-- Datos de Firebase -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- SECCIÓN ESCÁNER (NUEVA PERO OCULTA) -->
            <section id="scanner-section" class="admin-section" style="display: none;">
                <div class="scanner-container">
                    <div class="camera-wrapper">
                        <video id="video-preview" autoplay playsinline></video>
                        <div class="scanner-overlay">
                            <div class="target-box"></div>
                            <div class="scanner-line"></div>
                        </div>
                    </div>
                    <div class="scanner-controls">
                        <p>Ubica la carta dentro del recuadro</p>
                        <button id="captureBtn" class="btn-scan-action">Identificar Carta</button>
                        <button id="cancelScanBtn" class="btn-cancel">Cancelar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL DE CARTA (ACTUALIZADO) -->
    <div id="cardModal" class="admin-modal">
        <div class="admin-modal-content">
            <span class="close-button">&times;</span>
            <h3 id="cardModalTitle">Añadir/Editar Carta</h3>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                
                <label for="cardName">Nombre de la Carta:</label>
                <input type="text" id="cardName" required placeholder="Ej: Charizard">

                <!-- NUEVO CAMPO AGREGADO -->
                <label for="cardSetCode">Código del Set:</label>
                <input type="text" id="cardSetCode" placeholder="Ej: 151/165 o SWSH087">

                <label for="cardImage">URL de la Imagen:</label>
                <input type="text" id="cardImage" required>

                <label for="cardPrice">Precio ($):</label>
                <input type="number" id="cardPrice" step="0.01" required>

                <label for="cardStock">Stock:</label>
                <input type="number" id="cardStock" required>

                <label for="cardCategory">Categoría:</label>
                <select id="cardCategory" required>
                    <!-- Categorías dinámicas -->
                </select>

                <button type="submit" class="save-button">Guardar Carta</button>
            </form>
        </div>
    </div>

    <!-- Firebase y scripts (Tus scripts originales se mantienen) -->
    <script type="module" src="js/admin.js"></script>
</body>
</html>
