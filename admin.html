<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D TCG - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-state"> <!-- Clase inicial para control de estado -->

    <!-- PANTALLA DE LOGIN (BLOQUEO TOTAL) -->
    <div id="loginModal" class="admin-login-full-screen">
        <div class="login-content">
            <div class="login-branding">
                <i class="fas fa-user-shield"></i>
                <h1>D&D TCG</h1>
                <p>Panel de Control Administrativo</p>
            </div>
            <form id="loginForm" class="login-form-clean">
                <div class="form-input-wrapper">
                    <label>Correo Electrónico</label>
                    <input type="email" id="username" placeholder="ejemplo@dndtcg.com" required>
                </div>
                <div class="form-input-wrapper">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-action-btn">Iniciar Sesión</button>
                <p id="loginMessage" class="login-feedback"></p>
            </form>
        </div>
    </div>

    <!-- CONTENEDOR DEL PANEL (OCULTO HASTA EL LOGIN) -->
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="img/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/40'">
                <span>Admin Panel</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard-section" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="#cards-section" class="nav-link"><i class="fas fa-clone"></i> Cartas</a>
                <a href="#sealed-products-section" class="nav-link"><i class="fas fa-box-open"></i> Productos</a>
                <a href="#categories-section" class="nav-link"><i class="fas fa-tags"></i> Categorías</a>
                <a href="#orders-section" class="nav-link"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <a href="#" id="btnLogout" class="nav-link logout-link"><i class="fas fa-sign-out-alt"></i> Salir</a>
            </nav>
        </aside>

        <main class="main-content">
            <!-- SECCIONES ADMINISTRATIVAS -->
            <section id="dashboard-section" class="admin-section active">
                <header class="content-header">
                    <h1>Dashboard</h1>
                </header>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clone"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-cards">0</h3>
                            <p>Cartas</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-boxes"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-stock">0</h3>
                            <p>Stock</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-orders">0</h3>
                            <p>Pedidos</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- RESTO DE SECCIONES (CARTAS, PRODUCTOS, ETC) -->
            <section id="cards-section" class="admin-section">
                <header class="content-header">
                    <h2>Gestión de Inventario</h2>
                    <button class="btn-primary">Añadir Nueva Carta</button>
                </header>
                <div class="table-container">
                    <table id="cardsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
