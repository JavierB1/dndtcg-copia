<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D TCG - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-loading">

    <!-- PANTALLA DE LOGIN (CON ICONO EN LUGAR DE PNG) -->
    <div id="loginModal" class="admin-login-full-screen">
        <div class="login-content">
            <div class="login-branding">
                <!-- Cambiado: Usamos un icono de escudo en lugar de logo.png -->
                <i class="fas fa-dice-d20" style="font-size: 4rem; color: #6366f1; margin-bottom: 1rem;"></i>
                <h1>D&D TCG Admin</h1>
                <p>Introduzca sus credenciales para acceder</p>
            </div>
            <form id="loginForm" class="login-form-clean">
                <div class="form-input-wrapper">
                    <label>CORREO ELECTRÓNICO</label>
                    <input type="email" id="username" placeholder="admin@dndtcg.com" required>
                </div>
                <div class="form-input-wrapper">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btnLoginSubmit" class="login-action-btn">Entrar al Panel</button>
                <p id="loginMessage" class="login-feedback"></p>
            </form>
        </div>
    </div>

    <!-- CONTENEDOR DEL PANEL -->
    <div id="adminPanelContainer" class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <!-- Cambiado: Icono representativo en lugar de logo.png -->
                <i class="fas fa-dragon" style="color: #6366f1; font-size: 1.5rem;"></i>
                <span>D&D TCG</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard-section" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="#cards-section" class="nav-link"><i class="fas fa-clone"></i> Cartas</a>
                <a href="#sealed-products-section" class="nav-link"><i class="fas fa-box-open"></i> Productos</a>
                <a href="#categories-section" class="nav-link"><i class="fas fa-tags"></i> Categorías</a>
                <a href="#orders-section" class="nav-link"><i class="fas fa-shopping-cart"></i> Pedidos</a>
                <div class="sidebar-divider" style="height: 1px; background: rgba(255,255,255,0.1); margin: 1rem 0;"></div>
                <a href="#" id="btnLogout" class="nav-link logout-link" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </nav>
        </aside>

        <main class="main-content">
            <!-- DASHBOARD -->
            <section id="dashboard-section" class="admin-section active">
                <div class="content-header">
                    <h1>Resumen General</h1>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clone"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-cards">0</h3>
                            <p>Cartas en Base</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-boxes"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-stock">0</h3>
                            <p>Stock Total</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-total-orders">0</h3>
                            <p>Pedidos</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Otras secciones permanecen igual pero sin referencias a imágenes rotas -->
            <section id="cards-section" class="admin-section">
                <div class="content-header">
                    <h2>Gestión de Cartas</h2>
                </div>
                <div class="table-container">
                    <table id="cardsTable">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Categoría</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
            
            <!-- (Las demás secciones siguen la misma lógica) -->
        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
